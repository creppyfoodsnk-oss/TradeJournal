// ── Helpers ──────────────────────────────────────────────────────────────────
const f$=n=>(n>=0?"+":"")+n.toFixed(2);
const net=t=>t.pnl+(t.comm||0);
const col=v=>v>=0?"#4ADE80":"#F87171";

// ── Trading discipline flags ─────────────────────────────────────────────────
// Returns true if a HH:MM time string falls within a [start,end) window,
// handling windows that wrap past midnight (e.g. 22:00–02:00).
function inWindow(time,start,end){
  if(!time||!start||!end)return false;
  const t=time.replace(":",""),s=start.replace(":",""),e=end.replace(":","");
  if(s<=e)return t>=s&&t<=e;
  return t>=s||t<=e; // wraps past midnight
}

function isOffHours(t,settings){
  if(!settings.enableHourFlag)return false;
  const inLondon=inWindow(t.eT,settings.londonStart,settings.londonEnd);
  const inNY=inWindow(t.eT,settings.nyStart,settings.nyEnd);
  return!(inLondon||inNY);
}

function isOversized(t,settings){
  if(!settings.enableLotFlag)return false;
  const maxLots=parseFloat(settings.maxLots);
  if(isNaN(maxLots))return false;
  return t.lots>maxLots;
}

function disciplineFlags(t,settings){
  const flags=[];
  if(isOffHours(t,settings))flags.push({icon:"⏰",label:"Off-hours",color:"#F0B429"});
  if(isOversized(t,settings))flags.push({icon:"⚠️",label:"Oversized ("+t.lots+" lots)",color:"#F87171"});
  return flags;
}

function calcStats(trades,settings){
  settings=settings||state.settings;
  const nets=trades.map(net);
  const total=nets.reduce((a,b)=>a+b,0);
  const wins=nets.filter(n=>n>0),losses=nets.filter(n=>n<0);
  const aw=wins.length?wins.reduce((a,b)=>a+b,0)/wins.length:0;
  const al=losses.length?Math.abs(losses.reduce((a,b)=>a+b,0)/losses.length):0;
  const comm=trades.reduce((a,t)=>a+(t.comm||0),0);
  const psych=trades.length?trades.reduce((a,t)=>a+(t.psych||3),0)/trades.length:0;
  const cg=trades.filter(t=>t.psych>=4);
  const cwr=cg.length?(cg.filter(t=>net(t)>0).length/cg.length)*100:0;
  const flaggedNotes=trades.filter(t=>/said i was done|revenge trade|impulsive size/i.test(t.notes||"")).length;

  // ── Session breakdown ────────────────────────────────────────
  const londonTrades=trades.filter(t=>inWindow(t.eT,settings.londonStart,settings.londonEnd));
  const nyTrades=trades.filter(t=>inWindow(t.eT,settings.nyStart,settings.nyEnd));
  const londonNet=londonTrades.reduce((a,t)=>a+net(t),0);
  const nyNet=nyTrades.reduce((a,t)=>a+net(t),0);
  const londonWr=londonTrades.length?(londonTrades.filter(t=>net(t)>0).length/londonTrades.length)*100:0;
  const nyWr=nyTrades.length?(nyTrades.filter(t=>net(t)>0).length/nyTrades.length)*100:0;

  // ── Streak: consecutive CLEAN trading days ───────────────────
  // A "clean day" = no off-hours AND no oversized trades that day
  const byDate={};
  trades.forEach(t=>{
    if(!byDate[t.date])byDate[t.date]=[];
    byDate[t.date].push(t);
  });
  const sortedDates=Object.keys(byDate).sort();
  let currentStreak=0,bestStreak=0,streak=0;
  sortedDates.forEach(d=>{
    const dayTrades=byDate[d];
    const hasOffHours=settings.enableHourFlag&&dayTrades.some(t=>isOffHours(t,settings));
    const hasOversized=settings.enableLotFlag&&dayTrades.some(t=>isOversized(t,settings));
    const req=settings.cleanDayRequires||"both";
    const dirty=(req==="both"&&(hasOffHours||hasOversized))||(req==="hours"&&hasOffHours)||(req==="lots"&&hasOversized);
    if(!dirty){streak++;bestStreak=Math.max(bestStreak,streak);}
    else{streak=0;}
  });
  currentStreak=streak;

  // ── Multi-device merge helper: track last modified ───────────
  return{total,wr:trades.length?(wins.length/trades.length)*100:0,wins:wins.length,losses:losses.length,n:trades.length,aw,al,rr:al?aw/al:0,comm,psych,cwr,flaggedNotes,
    londonTrades:londonTrades.length,londonNet,londonWr,
    nyTrades:nyTrades.length,nyNet,nyWr,
    currentStreak,bestStreak};
}

function buildCurve(trades){
  const b={};
  [...trades].sort((a,c)=>a.date.localeCompare(c.date)).forEach(t=>{if(!b[t.date])b[t.date]=0;b[t.date]+=net(t);});
  let c=0;
  return Object.entries(b).map(([d,n])=>{c+=n;return{date:d.slice(5),daily:parseFloat(n.toFixed(2)),cum:parseFloat(c.toFixed(2))};});
}

// ── SVG Charts ───────────────────────────────────────────────────────────────
function lineChart(data,xKey,yKey,color,h){
  if(!data.length)return"";
  const W=360,H=h||140,PL=36,PR=8,PT=8,PB=24;
  const cw=W-PL-PR,ch=H-PT-PB;
  const ys=data.map(d=>d[yKey]);
  const mn=Math.min(...ys),mx=Math.max(...ys);
  const rng=mx-mn||1;
  const px=(i)=>PL+i*(cw/(data.length-1||1));
  const py=(v)=>PT+ch-(((v-mn)/rng)*ch);
  const pts=data.map((d,i)=>px(i)+","+py(d[yKey])).join(" ");
  const zerY=py(0);
  // y-axis ticks
  const ticks=4;
  const tickVals=Array.from({length:ticks+1},(_,i)=>mn+(rng/ticks)*i);
  let svgTicks="",svgGrid="";
  tickVals.forEach(v=>{
    const y=py(v);
    svgTicks+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" fill="#8B949E" font-size="9">${v>=0?"+":""+(v.toFixed(0))}</text>`;
    svgGrid+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#21262D" stroke-width="0.5"/>`;
  });
  // x-axis labels (show ~5)
  let svgXlbls="";
  const step=Math.max(1,Math.floor(data.length/5));
  data.forEach((d,i)=>{if(i%step===0||i===data.length-1)svgXlbls+=`<text x="${px(i)}" y="${H-PB+14}" text-anchor="middle" fill="#8B949E" font-size="9">${d[xKey]}</text>`;});
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
    ${svgGrid}
    <line x1="${PL}" y1="${zerY}" x2="${W-PR}" y2="${zerY}" stroke="#30363D" stroke-dasharray="3,3" stroke-width="1"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${data.map((d,i)=>`<circle cx="${px(i)}" cy="${py(d[yKey])}" r="3" fill="${color}"/>`).join("")}
    ${svgTicks}${svgXlbls}
  </svg>`;
}

function barChart(data,xKey,yKey,h){
  if(!data.length)return"";
  const W=360,H=h||130,PL=36,PR=8,PT=8,PB=24;
  const cw=W-PL-PR,ch=H-PT-PB;
  const ys=data.map(d=>d[yKey]);
  const mn=Math.min(0,Math.min(...ys)),mx=Math.max(0,Math.max(...ys));
  const rng=mx-mn||1;
  const bw=Math.max(2,(cw/data.length)-2);
  const py=(v)=>PT+ch-(((v-mn)/rng)*ch);
  const zerY=py(0);
  const tickVals=[-1,-.5,0,.5,1].map(f=>mn+rng*(f+1)/2).filter(v=>v>=mn&&v<=mx);
  let svgTicks="",svgBars="";
  tickVals.forEach(v=>{const y=py(v);svgTicks+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" fill="#8B949E" font-size="9">${v.toFixed(0)}</text>`;});
  data.forEach((d,i)=>{
    const x=PL+i*(cw/data.length)+1;
    const v=d[yKey],yTop=py(Math.max(0,v)),yBot=py(Math.min(0,v));
    const bh=Math.max(1,yBot-yTop);
    svgBars+=`<rect x="${x}" y="${yTop}" width="${bw}" height="${bh}" fill="${v>=0?"#4ADE80":"#F87171"}" rx="2"/>`;
  });
  let svgXlbls="";
  const step=Math.max(1,Math.floor(data.length/5));
  data.forEach((d,i)=>{if(i%step===0)svgXlbls+=`<text x="${PL+i*(cw/data.length)+bw/2+1}" y="${H-PB+14}" text-anchor="middle" fill="#8B949E" font-size="9">${d[xKey]}</text>`;});
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
    <line x1="${PL}" y1="${zerY}" x2="${W-PR}" y2="${zerY}" stroke="#30363D" stroke-width="1"/>
    ${svgBars}${svgTicks}${svgXlbls}
  </svg>`;
}

function psychBarChart(data){
  const W=360,H=160,PL=36,PR=8,PT=8,PB=24;
  const cw=W-PL-PR,ch=H-PT-PB;
  const ys=data.map(d=>d.avg);
  const mn=Math.min(0,Math.min(...ys)),mx=Math.max(0,Math.max(...ys));
  const rng=mx-mn||1;
  const bw=(cw/data.length)-6;
  const py=(v)=>PT+ch-(((v-mn)/rng)*ch);
  const zerY=py(0);
  let svgBars="",svgXlbls="";
  data.forEach((d,i)=>{
    const x=PL+i*(cw/data.length)+3;
    const v=d.avg,yTop=py(Math.max(0,v)),yBot=py(Math.min(0,v));
    const bh=Math.max(1,yBot-yTop);
    svgBars+=`<rect x="${x}" y="${yTop}" width="${bw}" height="${bh}" fill="${v>=0?"#4ADE80":"#F87171"}" rx="3"/>`;
    svgXlbls+=`<text x="${x+bw/2}" y="${H-PB+14}" text-anchor="middle" fill="#C9D1D9" font-size="11">${d.label}</text>`;
  });
  const tickVals=3;
  let svgTicks="";
  for(let i=0;i<=tickVals;i++){const v=mn+(rng/tickVals)*i;const y=py(v);svgTicks+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" fill="#8B949E" font-size="9">${v.toFixed(1)}</text>`;}
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
    <line x1="${PL}" y1="${zerY}" x2="${W-PR}" y2="${zerY}" stroke="#30363D" stroke-width="1"/>
    ${svgBars}${svgTicks}${svgXlbls}
  </svg>`;
}

async function callAI(prompt,onResult,onLoading){
  onLoading(true);
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    onResult(d.content?.map(b=>b.text||"").join("")||"No response");
  }catch{onResult("AI analysis failed — check your internet connection.");}
  onLoading(false);
}

// ── HTML builders ────────────────────────────────────────────────────────────
function h(tag,attrs,inner){
  const a=Object.entries(attrs||{}).map(([k,v])=>{
    if(k==="style"&&typeof v==="object")return` style="${Object.entries(v).map(([p,q])=>p.replace(/[A-Z]/g,m=>"-"+m.toLowerCase())+":"+q).join(";")}"`;
    if(k==="className")return` class="${v}"`;
    if(k.startsWith("on"))return"";// events handled separately
    return` ${k}="${v}"`;
  }).join("");
  const self=["input","br","hr"].includes(tag);
  return self?`<${tag}${a}/>`:`<${tag}${a}>${inner||""}</${tag}>`;
}

function statCard(label,value,sub,color){
  return`<div class="card"><div class="card-label">${label}</div><div class="card-val" style="color:${color||"#C9D1D9"}">${value}</div>${sub?`<div class="card-sub">${sub}</div>`:""}</div>`;
}

function badge(txt,color,bg){
  return`<span class="badge" style="background:${bg||color+"22"};color:${color}">${txt}</span>`;
}

function psychStars(rating,id){
  const labels=["","😤 Emotional","😟 Uncertain","😐 Neutral","🙂 Confident","🧘 In the Zone"];
  const stars=[1,2,3,4,5].map(n=>`<button class="psych-btn" onclick="setPsych('${id}',${n})" style="opacity:${n<=rating?1:.25};filter:${n<=rating?"none":"grayscale(1)"}" title="${n}"">⬡</button>`).join("");

  return`<div class="psych-stars">${stars}${lbl}</div>`;
}

function selOpts(opts,val){return opts.map(o=>typeof o==="string"?`<option${val===o?" selected":""}>${o}</option>`:`<option value="${o.v}"${val===o.v?" selected":""}>${o.l}</option>`).join("");}

function pnlPreviewHTML(f){
  const op=parseFloat(f.eP),cl=parseFloat(f.cP),lo=parseFloat(f.lots);
  if(isNaN(op)||isNaN(cl)||isNaN(lo))return"";
  const pv=f.sym==="XAUUSD"?100:f.sym==="GBPJPY"?0.076:10;
  const pnl=(f.type==="buy"?1:-1)*(cl-op)*lo*pv;
  const netVal=pnl+(parseFloat(f.comm)||0);
  return`<div style="padding:10px 12px;background:#0D1117;border-radius:6px;display:flex;gap:18px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
    <span style="color:#8B949E;font-size:12px">Gross:</span><span style="font-family:monospace;font-weight:700;font-size:16px;color:${col(pnl)}">${f$(pnl)}</span>
    <span style="color:#8B949E;font-size:12px">Net:</span><span style="font-family:monospace;font-weight:700;font-size:16px;color:${col(netVal)}">${f$(netVal)}</span>
  </div>`;
}

function addButtonsHTML(f,aiLoading){
  const missing=!f.eP||!f.cP||!f.lots;
  const missingSave=!f.date||!f.eP||!f.cP||!f.lots;
  return`<button class="btn-o" onclick="doAnalyse()" ${aiLoading||missing?"disabled":""} style="opacity:${missing?.4:1}">${aiLoading?"Analysing…":"⚡ Analyse with AI"}</button>
    <button class="btn" onclick="saveTrade()" ${missingSave?"disabled":""} style="opacity:${missingSave?.4:1}">Save Trade</button>`;
}

// ── Cooldown timer ────────────────────────────────────────────────────────────
function formatCooldown(ms){
  const totalSec=Math.max(0,Math.ceil(ms/1000));
  const m=Math.floor(totalSec/60),s=totalSec%60;
  return m+":"+String(s).padStart(2,"0");
}

function dismissCooldown(){
  state.cooldownUntil=0;
  localStorage.removeItem("tj_cooldown_until");
  render();
}

// Tick every second while a cooldown is active:
// - On the Add tab, update just the countdown text (no full re-render, preserves form focus)
// - On other tabs, the header badge needs a full render to update its countdown
// - When it expires, do exactly one full render to remove all cooldown UI
setInterval(()=>{
  if(!state.settings.enableCooldown||state.cooldownUntil<=0)return;
  const remaining=state.cooldownUntil-Date.now();
  if(remaining>0){
    if(state.tab==="add"){
      const el=document.getElementById("cooldown_timer");
      if(el)el.textContent=formatCooldown(remaining);
      const headerEl=document.getElementById("cooldown_header");
      if(headerEl)headerEl.textContent="🧘 Cooldown "+formatCooldown(remaining);
    }else{
      const headerEl=document.getElementById("cooldown_header");
      if(headerEl)headerEl.textContent="🧘 Cooldown "+formatCooldown(remaining);
    }
  }else{
    state.cooldownUntil=0;
    localStorage.removeItem("tj_cooldown_until");
    render();
  }
},1000);


// ── Sessions Tab ─────────────────────────────────────────────────────────────
function viewSessions(){
  const {trades,settings}=state;
  const st=calcStats(trades,settings);
  const londonTrades=trades.filter(t=>inWindow(t.eT,settings.londonStart,settings.londonEnd));
  const nyTrades=trades.filter(t=>inWindow(t.eT,settings.nyStart,settings.nyEnd));
  const offTrades=trades.filter(t=>isOffHours(t,settings));

  function sessionCard(title,emoji,window,tds){
    const nets=tds.map(net),tot=nets.reduce((a,b)=>a+b,0);
    const w=nets.filter(n=>n>0),l=nets.filter(n=>n<0);
    const aw=w.length?w.reduce((a,b)=>a+b,0)/w.length:0;
    const al=l.length?Math.abs(l.reduce((a,b)=>a+b,0)/l.length):0;
    return`<div class="panel">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><span style="font-size:20px">${emoji}</span><div><div style="color:#C9D1D9;font-weight:700;font-size:14px">${title}</div><div style="color:#8B949E;font-size:11px">${window} · ${tds.length} trades</div></div></div>
      ${[["Net P&L",f$(tot),col(tot)],["Win Rate",tds.length?(((w.length/tds.length)*100).toFixed(0)+"%"):"-"],["Avg Win",aw?f$(aw):"—"],["Avg Loss",al?f$(-al):"—"],["R:R",al?(aw/al).toFixed(2)+"x":"—"]]
        .map(([k,v,clr])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #21262D"><span style="color:#8B949E;font-size:12px">${k}</span><span style="font-family:monospace;font-size:13px;font-weight:700;color:${clr||"#C9D1D9"}">${v}</span></div>`).join("")}
    </div>`;
  }

  return`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${sessionCard("London Session","🇬🇧",settings.londonStart+"–"+settings.londonEnd,londonTrades)}
      ${sessionCard("New York Session","🇺🇸",settings.nyStart+"–"+settings.nyEnd,nyTrades)}
    </div>
    ${offTrades.length?`<div class="panel" style="border-color:#F0B429">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:20px">⏰</span><div><div style="color:#F0B429;font-weight:700;font-size:14px">Off-Hours Trades</div><div style="color:#8B949E;font-size:11px">Outside both session windows · ${offTrades.length} trades</div></div></div>
      ${[["Net P&L",f$(offTrades.reduce((a,t)=>a+net(t),0)),col(offTrades.reduce((a,t)=>a+net(t),0))],["Win Rate",(offTrades.filter(t=>net(t)>0).length/offTrades.length*100).toFixed(0)+"%"]]
        .map(([k,v,clr])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #21262D"><span style="color:#8B949E;font-size:12px">${k}</span><span style="font-family:monospace;font-size:13px;font-weight:700;color:${clr||"#C9D1D9"}">${v}</span></div>`).join("")}
      <div style="color:#8B949E;font-size:11px;margin-top:10px">Update session windows in ⚙️ Settings if daylight saving has shifted.</div>
    </div>`:"<div class='panel' style='border-color:#4ADE80'><div style='color:#4ADE80;font-size:13px'>✓ No off-hours trades recorded.</div></div>"}
  `;
}

// ── Streaks Tab ───────────────────────────────────────────────────────────────
function viewStreaks(){
  const {trades,settings}=state;
  const st=calcStats(trades,settings);

  // Build day-by-day streak history
  const byDate={};
  trades.forEach(t=>{if(!byDate[t.date])byDate[t.date]=[];byDate[t.date].push(t);});
  const sortedDates=Object.keys(byDate).sort();
  const dayRows=sortedDates.map(d=>{
    const dayTrades=byDate[d];
    const hasOH=settings.enableHourFlag&&dayTrades.some(t=>isOffHours(t,settings));
    const hasOS=settings.enableLotFlag&&dayTrades.some(t=>isOversized(t,settings));
    const dirty=hasOH||hasOS;
    const dayNet=dayTrades.reduce((a,t)=>a+net(t),0);
    const flags=[hasOH?"⏰ Off-hours":null,hasOS?"⚠️ Oversized":null].filter(Boolean);
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #21262D;flex-wrap:wrap;gap:6px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">${dirty?"🔴":"🟢"}</span>
        <div><div style="font-family:monospace;font-size:13px;color:#C9D1D9">${d}</div>${flags.length?`<div style="font-size:10px;color:#F0B429">${flags.join(" · ")}</div>`:""}</div>
      </div>
      <div style="display:flex;gap:14px;align-items:center">
        <span style="color:#8B949E;font-size:11px">${dayTrades.length} trades</span>
        <span style="font-family:monospace;font-size:13px;font-weight:700;color:${col(dayNet)}">${f$(dayNet)}</span>
      </div>
    </div>`;
  }).reverse().join(""); // newest first

  return`
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      ${statCard("Current Streak",st.currentStreak+" day"+(st.currentStreak!==1?"s":""),null,st.currentStreak>0?"#4ADE80":"#8B949E")}
      ${statCard("Best Streak",st.bestStreak+" day"+(st.bestStreak!==1?"s":""),null,"#F0B429")}
      ${statCard("Clean Days",sortedDates.filter(d=>{const dt=byDate[d];return!(settings.enableHourFlag&&dt.some(t=>isOffHours(t,settings)))&&!(settings.enableLotFlag&&dt.some(t=>isOversized(t,settings)));}).length+" of "+sortedDates.length,null,"#4ADE80")}
    </div>
    <div class="panel">
      <div class="panel-title">Day by Day</div>
      <div style="color:#8B949E;font-size:11px;margin-bottom:12px">🟢 Clean day &nbsp; 🔴 Discipline breach</div>
      ${dayRows||"<div style='color:#555E6D;font-size:13px'>No trades logged yet.</div>"}
    </div>
  `;
}

    <div style="color:#555E6D;font-size:11px;line-height:1.6;margin-bottom:6px">⚡ Auto-sync is on — adding, editing, or deleting a trade saves to the cloud automatically a moment later.</div>`:""}
    ${syncStatus==="syncing"?`<div style="color:#F0B429;font-size:13px;margin-top:8px">⟳ Syncing…</div>`:""}
    ${syncStatus==="ok"?`<div style="color:#4ADE80;font-size:13px;margin-top:8px">✓ ${syncMsg}</div>`:""}
    ${syncStatus==="error"?`<div style="color:#F87171;font-size:13px;margin-top:8px">✗ ${syncMsg}</div>`:""}
    ${lastSync?`<div style="color:#555E6D;font-size:11px;margin-top:6px">Last sync: ${lastSync}</div>`:""}
  </div>
  <div class="panel" style="border-color:#F0B429"><div class="panel-title">📱 Sync to Another Browser/Device</div>
    <div style="color:#C9D1D9;font-size:13px;line-height:1.7">
      1. On <b>this</b> device, tap <b>📋 Copy</b> next to Bin ID above (or copy it manually)<br/>
      2. On the <b>other</b> browser, open Settings → Cloud Sync<br/>
      3. Paste the <b>same API Key</b> AND the <b>same Bin ID</b><br/>
      4. Tap <b>⬇ Load from Cloud</b>
    </div>
  </div>
  <div class="panel"><div class="panel-title">💾 Local Export / Import</div>
    <div style="color:#8B949E;font-size:12px;line-height:1.6;margin-bottom:14px">Export saves all ${trades.length} trades + settings as a JSON file. Import loads a previously exported file.</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn" onclick="doExport()">⬇ Export JSON</button>
      <label class="btn-g" style="cursor:pointer">⬆ Import JSON<input type="file" accept=".json" style="display:none" onchange="doImport(this)"/></label>
    </div>
    ${importMsg?`<div style="margin-top:12px;padding:9px 12px;border-radius:6px;background:${importMsg.ok?"rgba(74,222,128,.08)":"rgba(248,113,113,.08)"};border:1px solid ${importMsg.ok?"#4ADE80":"#F87171"};color:${importMsg.ok?"#4ADE80":"#F87171"};font-size:13px">${importMsg.msg}</div>`:""}
  </div>
  <button class="btn-r" onclick="resetSettings()">Reset to Defaults</button>`;
}

function viewModals(){
  const {tvUrl,delTarget,settings}=state;
  let out="";
  if(tvUrl){
    out+=`<div class="modal-bg" onclick="setState({tvUrl:null})">
      <div style="background:#161B22;border:1px solid #30363D;border-radius:12px;width:100%;max-width:860px;overflow:hidden" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #21262D">
          <span style="color:#F0B429;font-weight:700;font-size:13px">📊 TradingView Chart</span>
          <div style="display:flex;gap:10px;align-items:center">
            <a href="${tvUrl}" target="_blank" style="color:#8B949E;font-size:12px;text-decoration:none;border:1px solid #30363D;border-radius:5px;padding:4px 10px">Open in TradingView ↗</a>
            <button onclick="setState({tvUrl:null})" style="background:none;border:none;color:#8B949E;font-size:20px;cursor:pointer">✕</button>
          </div>
        </div>
        <iframe src="${tvUrl}" style="width:100%;height:480px;border:none;display:block" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
      </div>
    </div>`;
  }
  if(settings.confirmDel&&delTarget){
    const n=net(delTarget);
    out+=`<div class="modal-bg">
      <div class="modal" style="border-color:#F87171">
        <div style="color:#F87171;font-weight:700;font-size:16px;margin-bottom:12px">🗑 Delete Trade?</div>
        <div style="color:#C9D1D9;font-size:13px;margin-bottom:6px">${delTarget.date} · ${delTarget.type.toUpperCase()} ${delTarget.sym} · ${delTarget.lots} lots</div>
        <div style="font-family:monospace;font-weight:700;font-size:14px;margin-bottom:20px;color:${col(n)}">Net: ${f$(n)}</div>
        <div style="display:flex;gap:10px">
          <button class="btn" style="background:#F87171;flex:1" onclick="confirmDel()">Delete</button>
          <button onclick="setState({delTarget:null})" style="background:transparent;border:1px solid #30363D;color:#C9D1D9;border-radius:6px;padding:9px 16px;font-size:13px;cursor:pointer;flex:1">Cancel</button>
        </div>
      </div>
    </div>`;
  }
  return out;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const {tab,trades,settings}=state;
  const st=calcStats(trades);
  const TABS=[{id:"overview",l:"Overview"},{id:"psychology",l:"🧠 Psychology"},{id:"sessions",l:"📊 Sessions"},{id:"range",l:"📅 Range"},{id:"streaks",l:"🔥 Streaks"},{id:"review",l:"📝 Review"},{id:"log",l:"Trade Log"},{id:"add",l:"+ Add"},{id:"settings",l:"⚙️ Settings"}];
  const showCards=["overview","log","range","sessions","streaks"].includes(tab);

  const html=`
    ${viewModals()}
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">⬡</span><span style="color:#F0B429;font-size:18px;font-weight:700">${settings.name.toUpperCase()}</span></div>
        <div style="color:#8B949E;font-size:11px;margin-top:2px">May 2026 · ${trades.length} trades · Avg Psych ${st.psych.toFixed(1)}/5${state.binKey?` · <span style="color:${state.syncStatus==='ok'?'#4ADE80':state.syncStatus==='error'?'#F87171':'#F0B429'}">☁️ ${state.syncStatus==='ok'?'Synced':state.syncStatus==='syncing'?'Syncing…':'Cloud linked'}</span>`:''}${(state.settings.enableCooldown&&state.cooldownUntil>Date.now())?` · <span id="cooldown_header" style="color:#F87171">🧘 Cooldown ${formatCooldown(state.cooldownUntil-Date.now())}</span>`:''}</div>
      </div>
    </div>
    <div class="tabs">${TABS.map(t=>`<button class="tab${tab===t.id?" active":""}" onclick="setState({tab:'${t.id}'})">${t.l}</button>`).join("")}</div>
    ${showCards?`<div class="cards">
      ${statCard("Net P&L",f$(st.total),null,col(st.total))}
      ${statCard("Commission",f$(st.comm),null,col(st.comm))}
      ${statCard("Win Rate",st.wr.toFixed(0)+"%",st.wins+"W / "+st.losses+"L")}
      ${statCard("Avg Win",f$(st.aw),null,"#F0B429")}
      ${statCard("Avg Loss",f$(-st.al),null,"#F87171")}
      ${statCard("R:R",st.rr.toFixed(2)+"x")}
      ${statCard("Calm Win%",st.cwr.toFixed(0)+"%","psych 4–5","#F0B429")}
    </div>`:""}
    ${tab==="overview"?viewOverview():""}
    ${tab==="psychology"?viewPsych():""}
    ${tab==="sessions"?viewSessions():""}
    ${tab==="range"?viewRange():""}
    ${tab==="streaks"?viewStreaks():""}
    ${tab==="review"?viewReview():""}
    ${tab==="log"?viewLog():""}
    ${tab==="add"?viewAdd():""}
    ${tab==="settings"?viewSettings():""}
  `;
  document.getElementById("app").innerHTML=html;
}

// ── Event handlers ────────────────────────────────────────────────────────────
function toggleRow(id){setState({expandedRow:state.expandedRow===id?null:id});}
function openTV(url){setState({tvUrl:url});}
function setRange(f,t){setState({rangeFrom:f,rangeTo:t,rangeAi:null});}
function setSetting(k,v){state.settings[k]=v==="true"?true:v==="false"?false:v;render();}
function toggleSetting(k){state.settings[k]=!state.settings[k];render();}
function resetSettings(){setState({settings:{...DEFSETT}});}

function setReviewField(k,v){
  state.reviewForm={...state.reviewForm,[k]:v};
  // Update textarea directly without full re-render (preserve cursor)
  if(k==="text"){const el=document.getElementById("review_text");if(el)el.value=v;}
  else render();
}

function appendReview(prefix){
  if(!state.reviewForm)state.reviewForm={text:"",week:""};
  const existing=state.reviewForm.text||"";
  state.reviewForm.text=existing?(existing+"\n"+prefix):prefix;
  render();
}

function saveReview(){
  if(!state.reviewForm.text.trim())return;
  const review={id:Date.now().toString(),week:state.reviewForm.week||new Date().toISOString().slice(0,10),text:state.reviewForm.text.trim(),savedAt:new Date().toLocaleDateString()};
  state.weeklyReviews=[...state.weeklyReviews,review];
  localStorage.setItem("tj_weekly_reviews",JSON.stringify(state.weeklyReviews));
  setState({reviewForm:{text:"",week:""},reviewTab:"history"});
  autoSync();
}

function deleteReview(id){
  state.weeklyReviews=state.weeklyReviews.filter(r=>r.id!==id);
  localStorage.setItem("tj_weekly_reviews",JSON.stringify(state.weeklyReviews));
  render();
}

function addNoteTag(tag){
  if(!state.addForm)state.addForm=blankForm();
  const existing=state.addForm.notes||"";
  state.addForm.notes=existing?existing+" · "+tag:tag;
  state.addForm.psych=1; // these patterns are almost always a low-psychology moment
  render();
}

function formChange(id,val){
  if(!state.addForm)state.addForm=blankForm();
  const map={f_date:"date",f_eT:"eT",f_cT:"cT",f_type:"type",f_sym:"sym",f_lots:"lots",f_eP:"eP",f_cP:"cP",f_comm:"comm",f_exit:"exit",f_tv:"tv",f_notes:"notes"};
  if(map[id])state.addForm[map[id]]=val;
  // Update only the live preview + buttons, WITHOUT re-rendering the whole form
  // (a full render() would destroy/recreate the input and close the keyboard)
  const f=state.addForm;
  const previewEl=document.getElementById("pnl_preview");
  if(previewEl)previewEl.innerHTML=pnlPreviewHTML(f);
  const btnsEl=document.getElementById("add_buttons");
  if(btnsEl)btnsEl.innerHTML=addButtonsHTML(f,state.aiLoading);
}

function setPsych(ctx,val){
  if(ctx==="form"){if(!state.addForm)state.addForm=blankForm();state.addForm.psych=val;}
  render();
}

function delReq(id){
  const t=state.trades.find(x=>x.id===id);
  if(!t)return;
  if(!state.settings.confirmDel){state.trades=state.trades.filter(x=>x.id!==id);render();autoSync();}
  else setState({delTarget:t});
}
function confirmDel(){
  if(state.delTarget)state.trades=state.trades.filter(x=>x.id!==state.delTarget.id);
  setState({delTarget:null});
  autoSync();
}

function calcFormPnl(f){
  const op=parseFloat(f.eP),cl=parseFloat(f.cP),lo=parseFloat(f.lots);
  if(isNaN(op)||isNaN(cl)||isNaN(lo))return 0;
  const pv=f.sym==="XAUUSD"?100:f.sym==="GBPJPY"?0.076:10;
  return(f.type==="buy"?1:-1)*(cl-op)*lo*pv;
}

function saveTrade(){
  const f=state.addForm;
  if(!f||!f.date||!f.eP||!f.cP||!f.lots)return;
  const pnl=calcFormPnl(f);
  const comm=parseFloat(f.comm)||0;
  const netVal=pnl+comm;
  state.trades.push({id:Date.now(),date:f.date,eT:f.eT,cT:f.cT,type:f.type,sym:f.sym,lots:parseFloat(f.lots),eP:parseFloat(f.eP),cP:parseFloat(f.cP),pnl,comm,exit:f.exit,psych:f.psych,tv:f.tv,notes:f.notes});
  // Start a cooldown if this trade lost money
  if(state.settings.enableCooldown&&netVal<0){
    const mins=parseFloat(state.settings.cooldownMins)||30;
    const until=Date.now()+mins*60*1000;
    state.cooldownUntil=until;
    localStorage.setItem("tj_cooldown_until",String(until));
  }
  setState({tab:"log",addForm:null,aiText:null,expandedRow:null});
  autoSync();
}

async function doAnalyse(){
  const f=state.addForm;
  if(!f||!f.eP||!f.cP||!f.lots)return;
  const pnl=calcFormPnl(f);
  const comm=parseFloat(f.comm)||0,netv=pnl+comm;
  const pi=PSYCH[f.psych];
  const prompt=`Trading coach review:\n${f.type.toUpperCase()} ${f.sym} ${f.lots} lots\n${f.date} ${f.eT}→${f.cT}\nEntry:${f.eP} Exit:${f.cP}\nGross:${pnl.toFixed(2)} Comm:${comm} Net:${netv.toFixed(2)}\nClosed:${f.exit} Psych:${f.psych}/5 ${pi.e} ${pi.l}\nNotes:${f.notes||"none"}\n\n4 bullet points: trade quality, timing, psychology impact, one improvement tip. Direct, $ amounts.`;
  await callAI(prompt,r=>setState({aiText:r,aiLoading:false}),v=>setState({aiLoading:v}));
}

async function doRangeAI(){
  const {trades,rangeFrom,rangeTo}=state;
  const fil=trades.filter(t=>(!rangeFrom||t.date>=rangeFrom)&&(!rangeTo||t.date<=rangeTo));
  if(!fil.length)return;
  const st=calcStats(fil);
  const top3l=[...fil].sort((a,b)=>net(a)-net(b)).slice(0,3).map(t=>t.date+" "+t.type+" $"+net(t).toFixed(2)+" p"+t.psych).join(", ");
  const top3w=[...fil].sort((a,b)=>net(b)-net(a)).slice(0,3).map(t=>t.date+" "+t.type+" $"+net(t).toFixed(2)+" p"+t.psych).join(", ");
  const prompt=`Professional trading analyst. Period ${rangeFrom} to ${rangeTo}.\n${st.n} trades | Net $${st.total.toFixed(2)} | WR ${st.wr.toFixed(0)}%\nAvg Win $${st.aw.toFixed(2)} | Avg Loss $${st.al.toFixed(2)} | R:R ${st.rr.toFixed(2)}x\nAvg Psych ${st.psych.toFixed(1)}/5 | Comms $${Math.abs(st.comm).toFixed(2)}\nTop losses: ${top3l}\nTop wins: ${top3w}\n\n1.Verdict 2.Key strength 3.Key weakness 4.Psychology pattern 5.One rule to implement. Direct.`;
  await callAI(prompt,r=>setState({rangeAi:r,rangeAiLoading:false}),v=>setState({rangeAiLoading:v}));
}

function doExport(){
  const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),settings:state.settings,trades:state.trades},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="trade-journal-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);
}

function doImport(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!d.trades||!Array.isArray(d.trades))throw new Error();
      state.trades=d.trades;
      if(d.settings)Object.assign(state.settings,d.settings);
      setState({importMsg:{ok:true,msg:"✓ Imported "+d.trades.length+" trades successfully"}});
      autoSync();
    }catch{setState({importMsg:{ok:false,msg:"✗ Invalid file format"}});}
  };reader.readAsText(file);
}

// ── Cloud Sync (JSONBin.io) ─────────────────────────────────────────────────
const JSONBIN_BASE="https://api.jsonbin.io/v3/b";

function setBinKey(v){
  state.binKey=v.trim();
  localStorage.setItem("tj_bin_key",state.binKey);
  render();
}

function setBinId(v){
  state.binId=v.trim();
  localStorage.setItem("tj_bin_id",state.binId);
  render();
}

function copyBinId(){
  if(!state.binId)return;
  navigator.clipboard.writeText(state.binId).then(()=>{
    setState({syncStatus:"ok",syncMsg:"Bin ID copied to clipboard!"});
  }).catch(()=>{
    // Fallback for older browsers
    const ta=document.createElement("textarea");
    ta.value=state.binId;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    setState({syncStatus:"ok",syncMsg:"Bin ID copied to clipboard!"});
  });
}

async function doCloudSave(){
  if(!state.binKey)return;
  setState({syncStatus:"syncing",syncMsg:""});
  const payload={trades:state.trades,settings:state.settings,weeklyReviews:state.weeklyReviews||[],savedAt:new Date().toISOString()};
  try{
    let res, d;
    if(state.binId){
      // Update existing bin
      res=await fetch(JSONBIN_BASE+"/"+state.binId,{
        method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":state.binKey},
        body:JSON.stringify(payload)
      });
      d=await res.json();
      if(!res.ok)throw new Error(d.message||"Save failed");
    }else{
      // Create new bin
      res=await fetch(JSONBIN_BASE,{
        method:"POST",
        headers:{"Content-Type":"application/json","X-Master-Key":state.binKey,"X-Bin-Name":"trade-journal"},
        body:JSON.stringify(payload)
      });
      d=await res.json();
      if(!res.ok)throw new Error(d.message||"Create failed");
      state.binId=d.metadata.id;
      localStorage.setItem("tj_bin_id",state.binId);
    }
    const ts=new Date().toLocaleString();
    localStorage.setItem("tj_last_sync",ts);
    setState({syncStatus:"ok",syncMsg:"Saved "+state.trades.length+" trades · "+ts,lastSync:ts});
  }catch(err){
    setState({syncStatus:"error",syncMsg:err.message||"Network error — check your API key"});
  }
}

async function doCloudLoad(){
  if(!state.binKey){
    setState({syncStatus:"error",syncMsg:"Paste your API Key first"});
    return;
  }
  if(!state.binId){
    setState({syncStatus:"error",syncMsg:"Paste a Bin ID (from your other device) to load, or tap Save to Cloud to create one"});
    return;
  }
  setState({syncStatus:"syncing",syncMsg:""});
  try{
    const res=await fetch(JSONBIN_BASE+"/"+state.binId+"/latest",{headers:{"X-Master-Key":state.binKey}});
    const d=await res.json();
    if(!res.ok)throw new Error(d.message||"Load failed");
    const record=d.record;
    if(record.trades&&record.trades.length)state.trades=record.trades;
    if(record.settings&&Object.keys(record.settings).length)Object.assign(state.settings,record.settings);
      if(record.weeklyReviews&&Array.isArray(record.weeklyReviews)){
        // Merge reviews by id
        const existing={};
        (state.weeklyReviews||[]).forEach(r=>existing[r.id]=r);
        record.weeklyReviews.forEach(r=>existing[r.id]=r);
        state.weeklyReviews=Object.values(existing).sort((a,b)=>a.week.localeCompare(b.week));
        localStorage.setItem("tj_weekly_reviews",JSON.stringify(state.weeklyReviews));
      }
    const ts=new Date().toLocaleString();
    localStorage.setItem("tj_last_sync",ts);
    setState({syncStatus:"ok",syncMsg:"Loaded "+state.trades.length+" trades · "+ts,lastSync:ts});
  }catch(err){
    setState({syncStatus:"error",syncMsg:err.message||"Network error — check your API key"});
  }
}

function showSheetInstructions(){
  alert("GET YOUR FREE API KEY:\n\n1. Go to jsonbin.io and tap 'Sign Up' (free, takes 30 seconds)\n2. After logging in, go to your Dashboard\n3. Click 'API Keys' in the left menu\n4. Copy your 'X-Master-Key'\n5. Paste it into the field above\n6. Tap 'Save to Cloud'\n\nThat's it — your data now syncs across devices. Next time, just open this page and tap 'Load from Cloud'.");
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// Auto-load from cloud if key + bin already saved
if(state.binKey&&state.binId){
  doCloudLoad().catch(()=>{});
}
render();
</script>
